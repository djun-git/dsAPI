<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DeepSeek 聊天助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
    </script>
    <style>
        /* ===== 全局重置 & 变量 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #4F6EF7;
            --primary-light: #7B93FA;
            --primary-dark: #3A56D4;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text: #1E2A3A;
            --text-secondary: #6B7A8F;
            --border: #E8ECF1;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --user-msg-bg: #4F6EF7;
            --user-msg-text: #FFFFFF;
            --ai-msg-bg: #FFFFFF;
            --ai-msg-text: #1E2A3A;
            --sidebar-width: 280px;
            --header-height: 56px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --code-font: 'Fira Code', 'JetBrains Mono', 'SF Mono', 'Consolas', 'Menlo', 'source-code-pro', 'Courier New', monospace;
            --assistant-color: #6C5CE7;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            line-height: 1.5;
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* ===== 侧边栏 (仅对话历史) ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: var(--card-bg);
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.10);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform var(--transition);
            display: flex;
            flex-direction: column;
            padding-top: var(--header-height);
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }
        .sidebar-overlay.open { opacity: 1; pointer-events: auto; }

        .sidebar-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px 20px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .sidebar-header h2 { font-size: 17px; font-weight: 600; }
        .sidebar-header .btn-new {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 36px; height: 36px;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .sidebar-header .btn-new:active { background: var(--primary-dark); }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }
        .session-item {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
        }
        .session-item:active { background: var(--border); }
        .session-item.active { background: var(--primary); color: #fff; }
        .session-item .title {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-right: 8px;
        }
        .session-item .btn-del {
            width: 28px; height: 28px;
            border: none;
            background: transparent;
            border-radius: 50%;
            font-size: 16px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, color 0.2s;
        }
        .session-item .btn-del:active { background: rgba(0,0,0,0.08); }
        .session-item.active .btn-del { color: rgba(255,255,255,0.8); }
        .session-item.active .btn-del:active { background: rgba(255,255,255,0.2); }

        .sidebar-footer {
            padding: 12px 20px 20px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            flex-shrink: 0;
        }

        /* ===== 主区域 ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
            background: var(--bg);
        }

        .header {
            height: var(--header-height);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
            gap: 8px;
        }
        .header .left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .header .btn-menu {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            color: var(--text);
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .header .btn-menu:active { background: var(--border); }
        .header .title { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .header .right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .header .assistant-badge {
            font-size: 12px;
            background: rgba(108, 92, 231, 0.12);
            color: var(--assistant-color);
            padding: 4px 14px;
            border-radius: 16px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
            flex-shrink: 0;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            border: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header .assistant-badge:active { background: rgba(108, 92, 231, 0.22); transform: scale(0.96); }
        .header .assistant-badge .arrow { font-size: 10px; margin-left: 2px; }
        .header .btn-settings {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            color: var(--text);
            transition: background 0.2s;
        }
        .header .btn-settings:active { background: var(--border); }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .chat-area .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px 20px;
        }
        .chat-area .empty-state .icon { font-size: 52px; margin-bottom: 16px; opacity: 0.6; }
        .chat-area .empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
        .chat-area .empty-state p { font-size: 14px; max-width: 280px; }

        /* ===== 消息气泡 ===== */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 86%;
            animation: msgIn 0.3s ease-out;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.ai   { align-self: flex-start; align-items: flex-start; }

        .message .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: normal;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            user-select: text;
            cursor: text;
        }
        .message.user .bubble {
            background: var(--user-msg-bg);
            color: var(--user-msg-text);
            border-bottom-right-radius: 4px;
        }
        .message.ai .bubble {
            background: var(--ai-msg-bg);
            color: var(--ai-msg-text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .message .time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            padding: 0 4px;
            opacity: 0.7;
        }

        .message .bubble .loading-dots {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }
        .message .bubble .loading-dots span {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--primary-light);
            animation: dotBounce 1.2s ease-in-out infinite;
        }
        .message .bubble .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .message .bubble .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ===== Markdown 样式 ===== */
        .message .bubble h1, .message .bubble h2, .message .bubble h3,
        .message .bubble h4, .message .bubble h5, .message .bubble h6 {
            margin: 0.5em 0 0.3em;
            line-height: 1.2;
            font-weight: 600;
        }
        .message .bubble h1 { font-size: 1.5em; }
        .message .bubble h2 { font-size: 1.35em; }
        .message .bubble h3 { font-size: 1.2em; }
        .message .bubble p { margin: 0.4em 0; }
        .message .bubble ul, .message .bubble ol { margin: 0.4em 0; padding-left: 1.8em; }
        .message .bubble li { margin: 0.15em 0; }
        .message .bubble blockquote {
            border-left: 4px solid var(--primary);
            padding-left: 1em;
            margin: 0.5em 0;
            color: var(--text-secondary);
        }
        .message .bubble table {
            border-collapse: collapse;
            margin: 0.5em 0;
            width: 100%;
        }
        .message .bubble th, .message .bubble td {
            border: 1px solid var(--border);
            padding: 6px 10px;
            text-align: left;
        }
        .message .bubble pre {
            background: #f4f6f9;
            border-left: 4px solid var(--primary);
            border-radius: 8px;
            padding: 12px 16px;
            margin: 8px 0;
            overflow-x: auto;
            font-family: var(--code-font);
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message .bubble pre code {
            background: transparent;
            padding: 0;
            font-size: inherit;
            color: inherit;
        }
        .message .bubble code:not(pre code) {
            background: rgba(79,110,247,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: var(--code-font);
            font-size: 0.9em;
        }

        /* ===== 底部输入区 ===== */
        .footer {
            padding: 6px 12px calc(6px + var(--safe-bottom));
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .model-selector {
            display: flex;
            gap: 6px;
            justify-content: flex-start;
            padding-left: 2px;
        }
        .model-selector .model-btn {
            padding: 4px 14px;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            background: transparent;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            line-height: 1.4;
        }
        .model-selector .model-btn:active { transform: scale(0.95); }
        .model-selector .model-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            width: 100%;
            flex-shrink: 0;
        }
        .input-row .input-wrap {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 6px;
            background: var(--bg);
            border-radius: 24px;
            padding: 4px 4px 4px 16px;
            border: 1.5px solid var(--border);
            transition: border-color 0.2s;
            min-width: 0;
        }
        .input-row .input-wrap:focus-within { border-color: var(--primary); }
        .input-row .input-wrap textarea {
            flex: 1;
            border: none;
            background: transparent;
            padding: 8px 0;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 100px;
            line-height: 1.5;
            color: var(--text);
            min-width: 0;
        }
        .input-row .input-wrap textarea::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .input-row .btn-send {
            width: 40px; height: 40px;
            border: none;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.15s;
            box-shadow: 0 2px 8px rgba(79,110,247,0.3);
        }
        .input-row .btn-send:active {
            transform: scale(0.92);
            background: var(--primary-dark);
        }
        .input-row .btn-send:disabled {
            background: var(--border);
            box-shadow: none;
            cursor: not-allowed;
            color: var(--text-secondary);
        }

        /* ===== 通用弹窗 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            padding: 20px;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px 24px 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
            transform: scale(0.92) translateY(20px);
            transition: transform 0.3s;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-overlay.open .modal { transform: scale(1) translateY(0); }
        .modal h3 { font-size: 19px; font-weight: 600; margin-bottom: 16px; text-align: center; }
        .modal .field { margin-bottom: 16px; }
        .modal .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .modal .field input, .modal .field select, .modal .field textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }
        .modal .field input:focus, .modal .field select:focus, .modal .field textarea:focus { border-color: var(--primary); }
        .modal .field textarea { min-height: 80px; resize: vertical; }
        .modal .field .hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; opacity: 0.7; }

        .advanced-params {
            margin-top: 16px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
        .advanced-params .toggle-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            padding: 4px 0;
            user-select: none;
        }
        .advanced-params .toggle-header span { transition: transform 0.2s; font-size: 12px; }
        .advanced-params .toggle-header.open span { transform: rotate(90deg); }
        .advanced-params .params-body { display: none; margin-top: 12px; }
        .advanced-params .params-body.open { display: block; }
        .param-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .param-row label { font-size: 13px; color: var(--text-secondary); min-width: 80px; flex-shrink: 0; }
        .param-row .switch-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .param-row .switch-wrap input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .param-row .switch-wrap input[type="number"],
        .param-row .switch-wrap input[type="text"] {
            width: 80px;
            padding: 6px 10px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }
        .param-row .switch-wrap input:disabled { opacity: 0.4; cursor: not-allowed; }
        .param-row .switch-wrap input:focus { border-color: var(--primary); }
        .param-row .hint { font-size: 12px; color: var(--text-secondary); opacity: 0.8; width: 100%; padding-left: 90px; }
        .modal .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal .actions button {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .modal .actions button:active { transform: scale(0.97); }
        .modal .actions .btn-cancel { background: var(--border); color: var(--text); }
        .modal .actions .btn-cancel:active { background: #d5dce5; }
        .modal .actions .btn-confirm { background: var(--primary); color: #fff; }
        .modal .actions .btn-confirm:active { background: var(--primary-dark); }
        .modal .actions .btn-danger { background: #e74c3c; color: #fff; flex: 0.4; }
        .modal .actions .btn-danger:active { background: #c0392b; }

        /* ===== 助手管理弹窗专用 ===== */
        .manager-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin: 8px 0 16px;
            max-height: 300px;
            overflow-y: auto;
        }
        .manager-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            background: var(--bg);
            border: 1px solid var(--border);
            transition: background 0.2s;
        }
        .manager-item .name {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .manager-item .actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .manager-item .actions button {
            width: 28px; height: 28px;
            border: none;
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--text-secondary);
            transition: background 0.2s, color 0.2s;
        }
        .manager-item .actions button:active { background: var(--border); }
        .manager-item .actions .edit-btn { color: var(--primary); }
        .manager-item .actions .del-btn { color: #e74c3c; }
        .manager-item .default-badge {
            font-size: 11px;
            background: var(--primary);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* ===== 响应式 ===== */
        @media (min-width: 600px) {
            .message { max-width: 72%; }
            .chat-area { padding: 24px 32px 12px; }
            .footer { padding: 10px 24px calc(10px + var(--safe-bottom)); gap: 8px; }
            .model-selector .model-btn { padding: 6px 18px; font-size: 13px; }
            .input-row .input-wrap { padding: 6px 6px 6px 20px; }
            .input-row .input-wrap textarea { padding: 10px 0; font-size: 15px; }
            .input-row .btn-send { width: 44px; height: 44px; font-size: 22px; }
        }
        @media (max-width: 400px) {
            .model-selector .model-btn { font-size: 11px; padding: 3px 10px; }
            .header .title { font-size: 15px; }
            .message .bubble { font-size: 14px; padding: 10px 14px; }
            .input-row .input-wrap textarea { font-size: 14px; }
            .input-row .btn-send { width: 36px; height: 36px; font-size: 18px; }
            .header .assistant-badge { max-width: 110px; font-size: 11px; padding: 3px 10px; }
        }
        @media (max-width: 360px) {
            .footer { padding: 4px 8px calc(4px + var(--safe-bottom)); gap: 4px; }
            .model-selector .model-btn { font-size: 10px; padding: 2px 8px; border-radius: 12px; }
            .input-row .input-wrap { padding: 2px 2px 2px 12px; border-radius: 20px; }
            .input-row .input-wrap textarea { padding: 6px 0; font-size: 13px; max-height: 72px; }
            .input-row .btn-send { width: 32px; height: 32px; font-size: 16px; }
            .param-row .switch-wrap input[type="number"] { width: 60px; }
        }

        /* ===== 暗色模式 ===== */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0F1520;
                --card-bg: #1A2233;
                --text: #E8EDF5;
                --text-secondary: #8899B0;
                --border: #2A3648;
                --shadow: 0 2px 12px rgba(0,0,0,0.4);
                --ai-msg-bg: #1A2233;
                --ai-msg-text: #E8EDF5;
                --user-msg-bg: #4F6EF7;
                --user-msg-text: #FFFFFF;
                --primary: #6B85FF;
                --primary-light: #95AAFF;
                --primary-dark: #4F6EF7;
                --assistant-color: #A29BFE;
            }
            .input-row .input-wrap { background: #0F1520; }
            .sidebar, .header, .footer, .modal { background: #1A2233; }
            .message .bubble pre { background: #111827; border-color: #4F6EF7; }
            .message .bubble pre code { color: #e2e8f0; }
            .message .bubble code:not(pre code) { background: rgba(79,110,247,0.2); }
            .modal .field input, .modal .field select, .modal .field textarea,
            .param-row .switch-wrap input[type="number"],
            .param-row .switch-wrap input[type="text"] { background: #0F1520; border-color: #2A3648; color: #E8EDF5; }
            .manager-item { background: #0F1520; border-color: #2A3648; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 侧边栏遮罩 -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <!-- 侧边栏 (仅对话历史) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <div class="sidebar-header">
                    <h2>💬 对话历史</h2>
                    <button class="btn-new" id="btnNewSession" title="新建对话">＋</button>
                </div>
                <div class="session-list" id="sessionList"></div>
                <div class="sidebar-footer">DeepSeek 聊天助手 · 本地存储</div>
            </div>
        </aside>

        <!-- 主区域 -->
        <div class="main">
            <header class="header">
                <div class="left">
                    <button class="btn-menu" id="btnMenu" aria-label="菜单">☰</button>
                    <span class="title">DeepSeek 助手</span>
                </div>
                <div class="right">
                    <button class="assistant-badge" id="headerAssistantBtn" title="切换助手">
                        <span id="assistantBadgeName">🤖 默认助手</span>
                        <span class="arrow">▼</span>
                    </button>
                    <button class="btn-settings" id="btnSettings" aria-label="设置">⚙️</button>
                </div>
            </header>

            <div class="chat-area" id="chatArea">
                <div class="empty-state" id="emptyState">
                    <div class="icon">🤖</div>
                    <h3>开始对话</h3>
                    <p>选择助手和模型，输入你的问题，DeepSeek 将为你解答。</p>
                </div>
            </div>

            <div class="footer">
                <div class="model-selector">
                    <button class="model-btn active" data-model="deepseek-chat" id="modelFlash">⚡ Flash</button>
                    <button class="model-btn" data-model="deepseek-reasoner" id="modelPro">🧠 Pro</button>
                </div>
                <div class="input-row">
                    <div class="input-wrap">
                        <textarea id="inputBox" rows="1" placeholder="输入消息…" enterkeyhint="send"></textarea>
                        <button class="btn-send" id="btnSend" aria-label="发送">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 设置弹窗 (API Key + 模型) ===== -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3>⚙️ 设置</h3>
            <div class="field">
                <label for="apiKeyInput">DeepSeek API Key</label>
                <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off" />
                <div class="hint">密钥仅保存在本地，请妥善保管。</div>
            </div>
            <div class="field">
                <label for="modelSelect">默认模型</label>
                <select id="modelSelect">
                    <option value="deepseek-chat">⚡ Flash（快速）</option>
                    <option value="deepseek-reasoner">🧠 Pro（推理）</option>
                </select>
            </div>
            <div class="actions">
                <button class="btn-cancel" id="btnSettingsCancel">取消</button>
                <button class="btn-confirm" id="btnSettingsConfirm">保存</button>
            </div>
        </div>
    </div>

    <!-- ===== 切换助手弹窗 (快速选择) ===== -->
    <div class="modal-overlay" id="switchAssistantModal">
        <div class="modal" style="max-width:340px;">
            <h3 style="font-size:17px;margin-bottom:12px;">🤖 切换助手</h3>
            <div id="switchAssistantList" style="display:flex;flex-direction:column;gap:4px;max-height:280px;overflow-y:auto;"></div>
            <div class="actions" style="margin-top:12px;gap:8px;">
                <button class="btn-confirm" id="btnManageAssistants" style="flex:1;">管理助手</button>
                <button class="btn-cancel" id="btnSwitchCancel" style="flex:0.6;">关闭</button>
            </div>
        </div>
    </div>

    <!-- ===== 助手管理弹窗 (列表 + 新建/编辑/删除) ===== -->
    <div class="modal-overlay" id="assistantManagerModal">
        <div class="modal" style="max-width:440px;">
            <h3 style="font-size:18px;">🤖 管理助手</h3>
            <div class="manager-list" id="managerList"></div>
            <div class="actions" style="gap:8px;">
                <button class="btn-confirm" id="btnNewAssistantFromManager" style="flex:1;">＋ 新建助手</button>
                <button class="btn-cancel" id="btnManagerClose" style="flex:0.5;">关闭</button>
            </div>
        </div>
    </div>

    <!-- ===== 助手编辑弹窗 (新建/编辑) ===== -->
    <div class="modal-overlay" id="assistantModal">
        <div class="modal">
            <h3 id="assistantModalTitle">🤖 编辑助手</h3>
            <input type="hidden" id="editAssistantId" value="" />
            <div class="field">
                <label for="editAssistantName">助手名称</label>
                <input type="text" id="editAssistantName" placeholder="例如：代码助手、翻译助手..." />
            </div>
            <div class="field">
                <label for="editSystemPrompt">系统提示词 (System Prompt)</label>
                <textarea id="editSystemPrompt" rows="3" placeholder="为助手设定角色和规则…"></textarea>
                <div class="hint">AI 将按照此提示词进行回复。留空则为通用对话。</div>
            </div>
            <div class="advanced-params">
                <div class="toggle-header" id="asstParamsToggle">
                    <span>▶</span> 高级参数
                </div>
                <div class="params-body" id="asstParamsBody">
                    <div class="param-row">
                        <label>max_tokens</label>
                        <div class="switch-wrap">
                            <input type="checkbox" id="asstEnableMaxTokens" />
                            <span style="font-size:12px;color:var(--text-secondary);">启用</span>
                            <input type="number" id="asstMaxTokensValue" value="4096" min="1" max="8192" step="1" disabled />
                        </div>
                    </div>
                    <div class="param-row">
                        <label>temperature</label>
                        <div class="switch-wrap">
                            <input type="checkbox" id="asstEnableTemperature" />
                            <span style="font-size:12px;color:var(--text-secondary);">启用</span>
                            <input type="number" id="asstTemperatureValue" value="0.7" min="0" max="2" step="0.1" disabled />
                        </div>
                    </div>
                    <div class="param-row">
                        <label>top_p</label>
                        <div class="switch-wrap">
                            <input type="checkbox" id="asstEnableTopP" />
                            <span style="font-size:12px;color:var(--text-secondary);">启用</span>
                            <input type="number" id="asstTopPValue" value="1" min="0" max="1" step="0.05" disabled />
                        </div>
                        <div class="hint">通常与temperature二选一</div>
                    </div>
                    <div class="param-row">
                        <label>frequency_penalty</label>
                        <div class="switch-wrap">
                            <input type="checkbox" id="asstEnableFrequencyPenalty" />
                            <span style="font-size:12px;color:var(--text-secondary);">启用</span>
                            <input type="number" id="asstFrequencyPenaltyValue" value="0.0" min="-2" max="2" step="0.1" disabled />
                        </div>
                    </div>
                    <div class="param-row">
                        <label>presence_penalty</label>
                        <div class="switch-wrap">
                            <input type="checkbox" id="asstEnablePresencePenalty" />
                            <span style="font-size:12px;color:var(--text-secondary);">启用</span>
                            <input type="number" id="asstPresencePenaltyValue" value="0.0" min="-2" max="2" step="0.1" disabled />
                        </div>
                    </div>
                    <div style="font-size:12px;color:var(--text-secondary);margin-top:8px;">
                        关闭的参数将使用 API 默认值。
                    </div>
                </div>
            </div>
            <div class="actions">
                <button class="btn-cancel" id="btnAssistantCancel">取消</button>
                <button class="btn-confirm" id="btnAssistantConfirm">保存</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const $ = (id) => document.getElementById(id);

            // ---------- DOM ----------
            const sidebar = $('sidebar');
            const sidebarOverlay = $('sidebarOverlay');
            const btnMenu = $('btnMenu');
            const btnNewSession = $('btnNewSession');
            const sessionList = $('sessionList');
            const chatArea = $('chatArea');
            const emptyState = $('emptyState');
            const inputBox = $('inputBox');
            const btnSend = $('btnSend');
            const btnSettings = $('btnSettings');
            const settingsModal = $('settingsModal');
            const apiKeyInput = $('apiKeyInput');
            const modelSelect = $('modelSelect');
            const btnSettingsCancel = $('btnSettingsCancel');
            const btnSettingsConfirm = $('btnSettingsConfirm');
            const modelFlash = $('modelFlash');
            const modelPro = $('modelPro');
            const headerAssistantBtn = $('headerAssistantBtn');
            const assistantBadgeName = $('assistantBadgeName');

            const switchAssistantModal = $('switchAssistantModal');
            const switchAssistantList = $('switchAssistantList');
            const btnSwitchCancel = $('btnSwitchCancel');
            const btnManageAssistants = $('btnManageAssistants');

            const assistantManagerModal = $('assistantManagerModal');
            const managerList = $('managerList');
            const btnNewAssistantFromManager = $('btnNewAssistantFromManager');
            const btnManagerClose = $('btnManagerClose');

            const assistantModal = $('assistantModal');
            const editAssistantId = $('editAssistantId');
            const editAssistantName = $('editAssistantName');
            const editSystemPrompt = $('editSystemPrompt');
            const asstParamsToggle = $('asstParamsToggle');
            const asstParamsBody = $('asstParamsBody');
            const asstEnableMaxTokens = $('asstEnableMaxTokens');
            const asstMaxTokensValue = $('asstMaxTokensValue');
            const asstEnableTemperature = $('asstEnableTemperature');
            const asstTemperatureValue = $('asstTemperatureValue');
            const asstEnableTopP = $('asstEnableTopP');
            const asstTopPValue = $('asstTopPValue');
            const asstEnableFrequencyPenalty = $('asstEnableFrequencyPenalty');
            const asstFrequencyPenaltyValue = $('asstFrequencyPenaltyValue');
            const asstEnablePresencePenalty = $('asstEnablePresencePenalty');
            const asstPresencePenaltyValue = $('asstPresencePenaltyValue');
            const btnAssistantCancel = $('btnAssistantCancel');
            const btnAssistantConfirm = $('btnAssistantConfirm');
            const assistantModalTitle = $('assistantModalTitle');

            const STORAGE_KEY = 'deepseek_chat_data_v3';
            const API_URL = 'https://api.deepseek.com/v1/chat/completions';

            // ---------- 默认助手 ----------
            const DEFAULT_ASSISTANT = {
                id: 'default',
                name: '默认助手',
                systemPrompt: '',
                temperatureEnabled: false,
                temperature: 0.7,
                maxTokensEnabled: false,
                maxTokens: 4096,
                topPEnabled: false,
                topP: 1,
                frequencyPenaltyEnabled: false,
                frequencyPenalty: 0.0,
                presencePenaltyEnabled: false,
                presencePenalty: 0.0,
                createdAt: Date.now(),
                updatedAt: Date.now()
            };

            let state = {
                apiKey: '',
                currentModel: 'deepseek-chat',
                sessions: {},
                currentSessionId: null,
                assistants: {},
                isLoading: false,
                sidebarOpen: false,
                editingFromManager: false,
            };

            let asstParamsOpen = false;

            // ---------- 工具 ----------
            function generateId() {
                return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
            }

            function formatTime(ts) {
                const d = new Date(ts);
                const h = d.getHours().toString().padStart(2, '0');
                const m = d.getMinutes().toString().padStart(2, '0');
                return h + ':' + m;
            }

            function formatDate(ts) {
                const d = new Date(ts);
                const month = (d.getMonth() + 1).toString().padStart(2, '0');
                const day = d.getDate().toString().padStart(2, '0');
                return month + '/' + day + ' ' + formatTime(ts);
            }

            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function truncate(str, len) {
                if (!str) return '';
                return str.length > len ? str.slice(0, len) + '…' : str;
            }

            // ---------- Markdown ----------
            function renderMessageContent(text) {
                if (!text) return '';
                marked.setOptions({ breaks: true, gfm: true });
                return marked.parse(text);
            }

            // ---------- 存储 ----------
            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const data = JSON.parse(raw);
                        state.apiKey = data.apiKey || '';
                        state.currentModel = data.currentModel || 'deepseek-chat';
                        state.sessions = data.sessions || {};
                        state.currentSessionId = data.currentSessionId || null;
                        state.assistants = data.assistants || {};

                        if (!state.assistants['default']) {
                            state.assistants['default'] = JSON.parse(JSON.stringify(DEFAULT_ASSISTANT));
                        }

                        for (const sid in state.sessions) {
                            const s = state.sessions[sid];
                            if (s.messages) {
                                s.messages = s.messages.filter(m => m.role && m.content !== undefined);
                            }
                            if (!s.assistantId || !state.assistants[s.assistantId]) {
                                s.assistantId = 'default';
                            }
                        }

                        // ---- 确保至少有一个空白对话 ----
                        const emptySessions = Object.keys(state.sessions).filter(id => state.sessions[id].messages.length === 0);
                        if (emptySessions.length === 0) {
                            const newId = generateId();
                            state.sessions[newId] = {
                                id: newId,
                                title: '新对话',
                                model: state.currentModel,
                                messages: [],
                                assistantId: 'default',
                                createdAt: Date.now(),
                                updatedAt: Date.now()
                            };
                            state.currentSessionId = newId;
                        } else {
                            emptySessions.sort((a, b) => (state.sessions[b].updatedAt || 0) - (state.sessions[a].updatedAt || 0));
                            state.currentSessionId = emptySessions[0];
                        }
                        // ---- 结束 ----

                        if (!state.sessions[state.currentSessionId]) {
                            const newId = generateId();
                            state.sessions[newId] = {
                                id: newId,
                                title: '新对话',
                                model: state.currentModel,
                                messages: [],
                                assistantId: 'default',
                                createdAt: Date.now(),
                                updatedAt: Date.now()
                            };
                            state.currentSessionId = newId;
                        }
                    } else {
                        state.assistants['default'] = JSON.parse(JSON.stringify(DEFAULT_ASSISTANT));
                        const newId = generateId();
                        state.sessions[newId] = {
                            id: newId,
                            title: '新对话',
                            model: state.currentModel,
                            messages: [],
                            assistantId: 'default',
                            createdAt: Date.now(),
                            updatedAt: Date.now()
                        };
                        state.currentSessionId = newId;
                    }

                    saveData();
                    updateModelUI();
                    updateHeaderAssistant();
                } catch (e) {
                    console.warn('加载数据失败，重置', e);
                    state.sessions = {};
                    state.assistants = { 'default': JSON.parse(JSON.stringify(DEFAULT_ASSISTANT)) };
                    const newId = generateId();
                    state.sessions[newId] = {
                        id: newId,
                        title: '新对话',
                        model: state.currentModel,
                        messages: [],
                        assistantId: 'default',
                        createdAt: Date.now(),
                        updatedAt: Date.now()
                    };
                    state.currentSessionId = newId;
                    saveData();
                    updateModelUI();
                    updateHeaderAssistant();
                }
            }

            function saveData() {
                try {
                    const data = {
                        apiKey: state.apiKey,
                        currentModel: state.currentModel,
                        sessions: state.sessions,
                        currentSessionId: state.currentSessionId,
                        assistants: state.assistants,
                    };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                } catch (e) {
                    console.warn('保存失败', e);
                }
            }

            // ---------- 助手函数 ----------
            function getAssistant(id) {
                return state.assistants[id] || state.assistants['default'];
            }

            function getCurrentAssistant() {
                const session = getCurrentSession();
                if (session) return getAssistant(session.assistantId);
                return state.assistants['default'];
            }

            function createAssistant(name, systemPrompt, params) {
                const id = generateId();
                const asst = {
                    id,
                    name: name || '新助手',
                    systemPrompt: systemPrompt || '',
                    temperatureEnabled: params?.temperatureEnabled || false,
                    temperature: params?.temperature ?? 0.7,
                    maxTokensEnabled: params?.maxTokensEnabled || false,
                    maxTokens: params?.maxTokens ?? 4096,
                    topPEnabled: params?.topPEnabled || false,
                    topP: params?.topP ?? 1,
                    frequencyPenaltyEnabled: params?.frequencyPenaltyEnabled || false,
                    frequencyPenalty: params?.frequencyPenalty ?? 0.0,
                    presencePenaltyEnabled: params?.presencePenaltyEnabled || false,
                    presencePenalty: params?.presencePenalty ?? 0.0,
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                };
                state.assistants[id] = asst;
                saveData();
                return id;
            }

            function updateAssistant(id, data) {
                const asst = state.assistants[id];
                if (!asst) return;
                if (data.name !== undefined) asst.name = data.name;
                if (data.systemPrompt !== undefined) asst.systemPrompt = data.systemPrompt;
                if (data.temperatureEnabled !== undefined) asst.temperatureEnabled = data.temperatureEnabled;
                if (data.temperature !== undefined) asst.temperature = data.temperature;
                if (data.maxTokensEnabled !== undefined) asst.maxTokensEnabled = data.maxTokensEnabled;
                if (data.maxTokens !== undefined) asst.maxTokens = data.maxTokens;
                if (data.topPEnabled !== undefined) asst.topPEnabled = data.topPEnabled;
                if (data.topP !== undefined) asst.topP = data.topP;
                if (data.frequencyPenaltyEnabled !== undefined) asst.frequencyPenaltyEnabled = data.frequencyPenaltyEnabled;
                if (data.frequencyPenalty !== undefined) asst.frequencyPenalty = data.frequencyPenalty;
                if (data.presencePenaltyEnabled !== undefined) asst.presencePenaltyEnabled = data.presencePenaltyEnabled;
                if (data.presencePenalty !== undefined) asst.presencePenalty = data.presencePenalty;
                asst.updatedAt = Date.now();
                saveData();
            }

            function deleteAssistant(id) {
                if (id === 'default') return;
                if (!state.assistants[id]) return;
                for (const sid in state.sessions) {
                    if (state.sessions[sid].assistantId === id) {
                        state.sessions[sid].assistantId = 'default';
                    }
                }
                delete state.assistants[id];
                saveData();
            }

            function setSessionAssistant(sessionId, assistantId) {
                const session = state.sessions[sessionId];
                if (!session) return;
                if (!state.assistants[assistantId]) return;
                session.assistantId = assistantId;
                session.updatedAt = Date.now();
                saveData();
            }

            // ---------- 会话 ----------
            function createNewSession() {
                const id = generateId();
                const session = {
                    id,
                    title: '新对话',
                    model: state.currentModel,
                    messages: [],
                    assistantId: 'default',
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                };
                state.sessions[id] = session;
                state.currentSessionId = id;
                saveData();
                renderSessionList();
                renderChat();
                updateHeaderAssistant();
                return id;
            }

            function deleteSession(id) {
                if (!state.sessions[id]) return;
                const wasCurrent = (id === state.currentSessionId);
                delete state.sessions[id];

                const emptySessions = Object.keys(state.sessions).filter(sid => state.sessions[sid].messages.length === 0);
                if (emptySessions.length === 0) {
                    if (Object.keys(state.sessions).length === 0) {
                        createNewSession();
                    } else {
                        const newId = generateId();
                        state.sessions[newId] = {
                            id: newId,
                            title: '新对话',
                            model: state.currentModel,
                            messages: [],
                            assistantId: 'default',
                            createdAt: Date.now(),
                            updatedAt: Date.now()
                        };
                        state.currentSessionId = newId;
                        saveData();
                        renderSessionList();
                        renderChat();
                        updateHeaderAssistant();
                        return;
                    }
                } else if (wasCurrent) {
                    emptySessions.sort((a, b) => (state.sessions[b].updatedAt || 0) - (state.sessions[a].updatedAt || 0));
                    state.currentSessionId = emptySessions[0];
                }
                saveData();
                renderSessionList();
                renderChat();
                updateHeaderAssistant();
            }

            function switchSession(id) {
                if (!state.sessions[id]) return;
                state.currentSessionId = id;
                state.currentModel = state.sessions[id].model || 'deepseek-chat';
                updateModelUI();
                saveData();
                renderSessionList();
                renderChat();
                updateHeaderAssistant();
                closeSidebar();
            }

            function getCurrentSession() {
                return state.sessions[state.currentSessionId] || null;
            }

            function updateSessionTitle(session, firstMsg) {
                if (!session) return;
                const title = firstMsg ? firstMsg.slice(0, 30) + (firstMsg.length > 30 ? '…' : '') : '新对话';
                if (session.title !== title) {
                    session.title = title;
                    session.updatedAt = Date.now();
                    saveData();
                    renderSessionList();
                }
            }

            // ---------- 消息 ----------
            function addMessage(role, content) {
                const session = getCurrentSession();
                if (!session) return;
                const msg = { role, content, timestamp: Date.now() };
                session.messages.push(msg);
                session.updatedAt = Date.now();
                if (role === 'user' && session.messages.filter(m => m.role === 'user').length === 1) {
                    updateSessionTitle(session, content);
                }
                saveData();
                renderChat();
                // 只有新消息时才滚动到底部
                scrollToBottom();
            }

            async function callDeepSeek(messages) {
                if (!state.apiKey) throw new Error('请先设置 API Key');
                const session = getCurrentSession();
                const assistant = getAssistant(session ? session.assistantId : 'default');
                const fullMessages = [];
                if (assistant.systemPrompt && assistant.systemPrompt.trim()) {
                    fullMessages.push({ role: 'system', content: assistant.systemPrompt.trim() });
                }
                const recent = messages.slice(-30);
                fullMessages.push(...recent.map(m => ({ role: m.role, content: m.content })));

                const body = {
                    model: state.currentModel,
                    messages: fullMessages,
                    stream: false,
                };
                if (assistant.maxTokensEnabled) body.max_tokens = assistant.maxTokens;
                if (assistant.temperatureEnabled) body.temperature = assistant.temperature;
                if (assistant.topPEnabled) body.top_p = assistant.topP;
                if (assistant.frequencyPenaltyEnabled) body.frequency_penalty = assistant.frequencyPenalty;
                if (assistant.presencePenaltyEnabled) body.presence_penalty = assistant.presencePenalty;

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + state.apiKey.trim(),
                    },
                    body: JSON.stringify(body),
                });
                if (!response.ok) {
                    let errMsg = `API 请求失败 (${response.status})`;
                    try { const errData = await response.json(); if (errData.error?.message) errMsg = errData.error.message; } catch (e) {}
                    throw new Error(errMsg);
                }
                const data = await response.json();
                if (data.choices && data.choices.length > 0) {
                    return data.choices[0].message.content;
                }
                throw new Error('API 返回异常：没有获取到回复内容');
            }

            async function sendMessage() {
                const text = inputBox.value.trim();
                if (!text || state.isLoading) return;
                const session = getCurrentSession();
                if (!session) { createNewSession(); }
                if (!state.apiKey.trim()) { openSettings(); return; }

                inputBox.value = '';
                autoResizeInput();
                addMessage('user', text);

                const sessionNow = getCurrentSession();
                const loadingMsg = { role: 'assistant', content: '', loading: true, timestamp: Date.now() };
                sessionNow.messages.push(loadingMsg);
                sessionNow.updatedAt = Date.now();
                saveData();
                renderChat();
                scrollToBottom(); // 显示加载动画

                state.isLoading = true;
                btnSend.disabled = true;
                inputBox.disabled = true;

                try {
                    const msgs = sessionNow.messages.filter(m => !m.loading && m.role);
                    const reply = await callDeepSeek(msgs);
                    sessionNow.messages = sessionNow.messages.filter(m => !m.loading);
                    sessionNow.messages.push({ role: 'assistant', content: reply, timestamp: Date.now() });
                    sessionNow.updatedAt = Date.now();
                    saveData();
                    renderChat();
                    scrollToBottom(); // 显示回复
                } catch (err) {
                    const sess = getCurrentSession();
                    if (sess) {
                        sess.messages = sess.messages.filter(m => !m.loading);
                        sess.messages.push({ role: 'assistant', content: '❌ ' + err.message, timestamp: Date.now(), isError: true });
                        sess.updatedAt = Date.now();
                        saveData();
                        renderChat();
                        scrollToBottom();
                    }
                } finally {
                    state.isLoading = false;
                    btnSend.disabled = false;
                    inputBox.disabled = false;
                    inputBox.focus();
                }
            }

            // ---------- 渲染 ----------
            function renderSessionList() {
                const ids = Object.keys(state.sessions);
                if (ids.length === 0) {
                    sessionList.innerHTML = `<div style="text-align:center;padding:32px 16px;color:var(--text-secondary);font-size:14px;">暂无对话</div>`;
                    return;
                }
                ids.sort((a, b) => (state.sessions[b].updatedAt || 0) - (state.sessions[a].updatedAt || 0));
                let html = '';
                for (const id of ids) {
                    const s = state.sessions[id];
                    const active = id === state.currentSessionId ? 'active' : '';
                    const title = s.title || '新对话';
                    const date = s.updatedAt ? formatDate(s.updatedAt) : '';
                    html += `
                        <div class="session-item ${active}" data-id="${id}">
                            <span class="title">${escapeHtml(title)}</span>
                            <span style="font-size:11px;opacity:0.6;margin-right:8px;flex-shrink:0;">${date}</span>
                            <button class="btn-del" data-id="${id}" title="删除">✕</button>
                        </div>
                    `;
                }
                sessionList.innerHTML = html;
                sessionList.querySelectorAll('.session-item').forEach(el => {
                    el.addEventListener('click', (e) => {
                        if (e.target.closest('.btn-del')) return;
                        const id = el.dataset.id;
                        if (id) switchSession(id);
                    });
                });
                sessionList.querySelectorAll('.btn-del').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        if (id && confirm('确认删除此对话？')) deleteSession(id);
                    });
                });
            }

            function renderChat() {
                const session = getCurrentSession();
                chatArea.innerHTML = '';
                if (!session || session.messages.length === 0) {
                    emptyState.style.display = 'flex';
                    const asst = getCurrentAssistant();
                    emptyState.querySelector('h3').textContent = `🤖 ${asst.name}`;
                    emptyState.querySelector('p').textContent = asst.systemPrompt ?
                        `提示词：${truncate(asst.systemPrompt, 80)}` :
                        '选择模型，输入你的问题，DeepSeek 将为你解答。';
                    return;
                }
                emptyState.style.display = 'none';
                for (const msg of session.messages) {
                    if (msg.loading) {
                        const div = document.createElement('div');
                        div.className = 'message ai';
                        div.innerHTML = `<div class="bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div><div class="time">思考中…</div>`;
                        chatArea.appendChild(div);
                        continue;
                    }
                    const role = msg.role === 'user' ? 'user' : 'ai';
                    const isError = msg.isError || false;
                    const div = document.createElement('div');
                    div.className = `message ${role}`;
                    const timeStr = msg.timestamp ? formatTime(msg.timestamp) : '';
                    const extraStyle = isError ? ' style="color:#E74C3C;"' : '';
                    div.innerHTML = `<div class="bubble"${extraStyle}>${renderMessageContent(msg.content)}</div><div class="time">${timeStr}</div>`;
                    chatArea.appendChild(div);
                }
                // 移除自动滚动到底部，保持顶部
            }

            function scrollToBottom() {
                requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
            }

            function updateModelUI() {
                const isFlash = state.currentModel === 'deepseek-chat';
                modelFlash.classList.toggle('active', isFlash);
                modelPro.classList.toggle('active', !isFlash);
                modelSelect.value = state.currentModel;
            }

            function updateHeaderAssistant() {
                const asst = getCurrentAssistant();
                assistantBadgeName.textContent = '🤖 ' + asst.name;
            }

            // ---------- 切换助手弹窗 ----------
            function openSwitchAssistant() {
                const session = getCurrentSession();
                if (!session) return;
                const currentId = session.assistantId || 'default';
                renderSwitchList(currentId);
                switchAssistantModal.classList.add('open');
            }

            function renderSwitchList(currentId) {
                const ids = Object.keys(state.assistants);
                ids.sort((a, b) => {
                    if (a === 'default') return -1;
                    if (b === 'default') return 1;
                    return (state.assistants[b].updatedAt || 0) - (state.assistants[a].updatedAt || 0);
                });
                let html = '';
                for (const id of ids) {
                    const a = state.assistants[id];
                    const active = id === currentId;
                    const hasPrompt = a.systemPrompt ? ' 📝' : '';
                    html += `
                        <div class="assistant-item ${active ? 'active' : ''}" data-id="${id}" style="cursor:pointer;padding:10px 14px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:8px;transition:background 0.2s;">
                            <span>🤖</span>
                            <span style="flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(a.name)}${hasPrompt}</span>
                            ${active ? '<span style="font-size:12px;color:var(--primary);font-weight:600;">✓</span>' : ''}
                        </div>
                    `;
                }
                switchAssistantList.innerHTML = html;
                switchAssistantList.querySelectorAll('.assistant-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const id = el.dataset.id;
                        if (id && state.currentSessionId) {
                            setSessionAssistant(state.currentSessionId, id);
                            updateHeaderAssistant();
                            renderChat();
                            switchAssistantModal.classList.remove('open');
                        }
                    });
                });
            }

            // ---------- 管理助手弹窗 ----------
            function openAssistantManager() {
                renderManagerList();
                assistantManagerModal.classList.add('open');
            }

            function renderManagerList() {
                const ids = Object.keys(state.assistants);
                ids.sort((a, b) => {
                    if (a === 'default') return -1;
                    if (b === 'default') return 1;
                    return (state.assistants[b].updatedAt || 0) - (state.assistants[a].updatedAt || 0);
                });
                let html = '';
                for (const id of ids) {
                    const a = state.assistants[id];
                    const isDefault = id === 'default';
                    html += `
                        <div class="manager-item">
                            <span>🤖</span>
                            <span class="name">${escapeHtml(a.name)}</span>
                            ${isDefault ? '<span class="default-badge">默认</span>' : ''}
                            <div class="actions">
                                <button class="edit-btn" data-id="${id}" title="编辑">✎</button>
                                ${isDefault ? '' : `<button class="del-btn" data-id="${id}" title="删除">✕</button>`}
                            </div>
                        </div>
                    `;
                }
                managerList.innerHTML = html;
                managerList.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        if (id) {
                            state.editingFromManager = true;
                            assistantManagerModal.classList.remove('open');
                            openAssistantEditor(id);
                        }
                    });
                });
                managerList.querySelectorAll('.del-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        if (id && id !== 'default' && confirm(`确认删除助手「${state.assistants[id]?.name}」？`)) {
                            deleteAssistant(id);
                            renderManagerList();
                            updateHeaderAssistant();
                            renderChat();
                        }
                    });
                });
            }

            // ---------- 编辑助手弹窗 ----------
            function openAssistantEditor(id) {
                const asst = state.assistants[id];
                if (!asst) return;
                editAssistantId.value = id;
                editAssistantName.value = asst.name;
                editSystemPrompt.value = asst.systemPrompt || '';
                asstEnableMaxTokens.checked = asst.maxTokensEnabled;
                asstMaxTokensValue.value = asst.maxTokens;
                asstMaxTokensValue.disabled = !asst.maxTokensEnabled;
                asstEnableTemperature.checked = asst.temperatureEnabled;
                asstTemperatureValue.value = asst.temperature;
                asstTemperatureValue.disabled = !asst.temperatureEnabled;
                asstEnableTopP.checked = asst.topPEnabled;
                asstTopPValue.value = asst.topP;
                asstTopPValue.disabled = !asst.topPEnabled;
                asstEnableFrequencyPenalty.checked = asst.frequencyPenaltyEnabled;
                asstFrequencyPenaltyValue.value = asst.frequencyPenalty;
                asstFrequencyPenaltyValue.disabled = !asst.frequencyPenaltyEnabled;
                asstEnablePresencePenalty.checked = asst.presencePenaltyEnabled;
                asstPresencePenaltyValue.value = asst.presencePenalty;
                asstPresencePenaltyValue.disabled = !asst.presencePenaltyEnabled;
                assistantModalTitle.textContent = id === 'default' ? '🤖 默认助手' : '🤖 编辑助手';
                asstParamsOpen = false;
                asstParamsToggle.classList.remove('open');
                asstParamsBody.classList.remove('open');
                asstParamsToggle.querySelector('span').textContent = '▶';
                assistantModal.classList.add('open');
            }

            function openNewAssistantEditor() {
                editAssistantId.value = '';
                editAssistantName.value = '';
                editSystemPrompt.value = '';
                asstEnableMaxTokens.checked = false;
                asstMaxTokensValue.value = 4096;
                asstMaxTokensValue.disabled = true;
                asstEnableTemperature.checked = false;
                asstTemperatureValue.value = 0.7;
                asstTemperatureValue.disabled = true;
                asstEnableTopP.checked = false;
                asstTopPValue.value = 1;
                asstTopPValue.disabled = true;
                asstEnableFrequencyPenalty.checked = false;
                asstFrequencyPenaltyValue.value = 0.0;
                asstFrequencyPenaltyValue.disabled = true;
                asstEnablePresencePenalty.checked = false;
                asstPresencePenaltyValue.value = 0.0;
                asstPresencePenaltyValue.disabled = true;
                assistantModalTitle.textContent = '🤖 新建助手';
                asstParamsOpen = false;
                asstParamsToggle.classList.remove('open');
                asstParamsBody.classList.remove('open');
                asstParamsToggle.querySelector('span').textContent = '▶';
                assistantModal.classList.add('open');
            }

            function collectAssistantFormData() {
                return {
                    name: editAssistantName.value.trim() || '未命名助手',
                    systemPrompt: editSystemPrompt.value.trim(),
                    maxTokensEnabled: asstEnableMaxTokens.checked,
                    maxTokens: parseInt(asstMaxTokensValue.value, 10) || 4096,
                    temperatureEnabled: asstEnableTemperature.checked,
                    temperature: parseFloat(asstTemperatureValue.value) || 0.7,
                    topPEnabled: asstEnableTopP.checked,
                    topP: parseFloat(asstTopPValue.value) || 1,
                    frequencyPenaltyEnabled: asstEnableFrequencyPenalty.checked,
                    frequencyPenalty: parseFloat(asstFrequencyPenaltyValue.value) || 0.0,
                    presencePenaltyEnabled: asstEnablePresencePenalty.checked,
                    presencePenalty: parseFloat(asstPresencePenaltyValue.value) || 0.0,
                };
            }

            function closeAssistantEditor() {
                assistantModal.classList.remove('open');
            }

            // ---------- UI 辅助 ----------
            function autoResizeInput() {
                inputBox.style.height = 'auto';
                inputBox.style.height = Math.min(inputBox.scrollHeight, 100) + 'px';
            }

            function openSettings() {
                apiKeyInput.value = state.apiKey || '';
                modelSelect.value = state.currentModel;
                settingsModal.classList.add('open');
                setTimeout(() => apiKeyInput.focus(), 200);
            }

            function closeSettings() { settingsModal.classList.remove('open'); }

            function openSidebar() {
                state.sidebarOpen = true;
                sidebar.classList.add('open');
                sidebarOverlay.classList.add('open');
            }

            function closeSidebar() {
                state.sidebarOpen = false;
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('open');
            }

            function toggleSidebar() { state.sidebarOpen ? closeSidebar() : openSidebar(); }

            // ---------- 事件绑定 ----------
            btnMenu.addEventListener('click', toggleSidebar);
            sidebarOverlay.addEventListener('click', closeSidebar);

            btnNewSession.addEventListener('click', () => {
                createNewSession();
                closeSidebar();
                inputBox.focus();
            });

            btnSend.addEventListener('click', sendMessage);
            inputBox.addEventListener('input', autoResizeInput);
            inputBox.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            });

            modelFlash.addEventListener('click', () => {
                state.currentModel = 'deepseek-chat';
                const session = getCurrentSession();
                if (session) session.model = state.currentModel;
                updateModelUI();
                saveData();
            });
            modelPro.addEventListener('click', () => {
                state.currentModel = 'deepseek-reasoner';
                const session = getCurrentSession();
                if (session) session.model = state.currentModel;
                updateModelUI();
                saveData();
            });

            btnSettings.addEventListener('click', openSettings);
            btnSettingsCancel.addEventListener('click', closeSettings);
            btnSettingsConfirm.addEventListener('click', () => {
                const key = apiKeyInput.value.trim();
                const model = modelSelect.value;
                if (!key) { alert('请输入 API Key'); return; }
                state.apiKey = key;
                state.currentModel = model;
                const session = getCurrentSession();
                if (session) session.model = model;
                updateModelUI();
                saveData();
                closeSettings();
                if (!getCurrentSession()) createNewSession();
                inputBox.focus();
            });
            settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) closeSettings(); });

            headerAssistantBtn.addEventListener('click', openSwitchAssistant);

            btnSwitchCancel.addEventListener('click', () => { switchAssistantModal.classList.remove('open'); });
            btnManageAssistants.addEventListener('click', () => {
                switchAssistantModal.classList.remove('open');
                openAssistantManager();
            });
            switchAssistantModal.addEventListener('click', (e) => { if (e.target === switchAssistantModal) switchAssistantModal.classList.remove('open'); });

            btnManagerClose.addEventListener('click', () => { assistantManagerModal.classList.remove('open'); });
            btnNewAssistantFromManager.addEventListener('click', () => {
                state.editingFromManager = true;
                assistantManagerModal.classList.remove('open');
                openNewAssistantEditor();
            });
            assistantManagerModal.addEventListener('click', (e) => { if (e.target === assistantManagerModal) assistantManagerModal.classList.remove('open'); });

            asstParamsToggle.addEventListener('click', () => {
                asstParamsOpen = !asstParamsOpen;
                asstParamsToggle.classList.toggle('open', asstParamsOpen);
                asstParamsBody.classList.toggle('open', asstParamsOpen);
                asstParamsToggle.querySelector('span').textContent = asstParamsOpen ? '▼' : '▶';
            });
            asstEnableMaxTokens.addEventListener('change', () => { asstMaxTokensValue.disabled = !asstEnableMaxTokens.checked; });
            asstEnableTemperature.addEventListener('change', () => { asstTemperatureValue.disabled = !asstEnableTemperature.checked; });
            asstEnableTopP.addEventListener('change', () => { asstTopPValue.disabled = !asstEnableTopP.checked; });
            asstEnableFrequencyPenalty.addEventListener('change', () => { asstFrequencyPenaltyValue.disabled = !asstEnableFrequencyPenalty.checked; });
            asstEnablePresencePenalty.addEventListener('change', () => { asstPresencePenaltyValue.disabled = !asstEnablePresencePenalty.checked; });

            btnAssistantCancel.addEventListener('click', closeAssistantEditor);
            btnAssistantConfirm.addEventListener('click', () => {
                const id = editAssistantId.value;
                const data = collectAssistantFormData();
                if (!data.name) { alert('请输入助手名称'); return; }
                if (id && state.assistants[id]) {
                    updateAssistant(id, data);
                } else {
                    const newId = createAssistant(data.name, data.systemPrompt, data);
                    const session = getCurrentSession();
                    if (session) {
                        if (confirm(`是否将当前对话切换到「${data.name}」？`)) {
                            setSessionAssistant(session.id, newId);
                            updateHeaderAssistant();
                            renderChat();
                        }
                    }
                }
                closeAssistantEditor();
                if (state.editingFromManager) {
                    state.editingFromManager = false;
                    openAssistantManager();
                }
                updateHeaderAssistant();
            });
            assistantModal.addEventListener('click', (e) => { if (e.target === assistantModal) closeAssistantEditor(); });

            window.addEventListener('resize', scrollToBottom);

            // ---------- 初始化 ----------
            function init() {
                loadData();
                if (state.apiKey) apiKeyInput.value = state.apiKey;
                updateModelUI();
                updateHeaderAssistant();
                renderSessionList();
                renderChat();
                // 初始显示时滚动到顶部（已经是顶部，无需额外操作）

                if (!state.apiKey) {
                    setTimeout(() => { openSettings(); }, 500);
                } else {
                    inputBox.focus();
                }

                document.addEventListener('visibilitychange', () => { if (document.hidden) saveData(); });
                window.addEventListener('beforeunload', saveData);
            }

            init();
        })();
    </script>
</body>
</html>
